global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "cardvault"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5101"]

  - job_name: "isoswitch"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5201"]
