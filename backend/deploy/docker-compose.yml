services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    ports: ["15432:5432"]

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Passw0rd!"
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports: ["11433:1433"]

  kafka:
    # CICD-10: corrected image (was bitnamilegacy/kafka:3.7)
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      # CICD-11: use service hostname (was localhost:9092 — breaks inter-container routing)
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports: ["9092:9092"]

  # ── Backend services ────────────────────────────────────────────────────────
  # All three services are built from the backend/ context (ADR-2, ADR-6).
  # Secrets are injected via .env (see .env.example for required variables).
  # CICD-INV-6: IsoAudit uses Jwt__Key; CardVault and IsoSwitch use Jwt__SigningKey.
  # --------------------------------------------------------------------------

  cardvault:
    build:
      context: ../../backend
      dockerfile: services/CardVault/src/CardVault.Api/Dockerfile
    ports:
      - "5101:5101"
    env_file: .env
    environment:
      # Kafka bootstrap — always kafka:9092 for inter-container networking
      - Kafka__BootstrapServers=kafka:9092
      # W-1 fix: a single shared .env cannot hold two different Postgres databases.
      # .env carries ConnectionStrings__Postgres=isoswitch (for IsoSwitch, no override).
      # CardVault overrides here to its own DB, matching the Kafka override pattern.
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=cardvault;Username=postgres;Password=postgres
    depends_on:
      - postgres
      - sqlserver
      - kafka

  isoswitch:
    build:
      context: ../../backend
      dockerfile: services/IsoSwitch/src/IsoSwitch.Api/Dockerfile
    ports:
      - "5201:5201"
    env_file: .env
    environment:
      # Kafka bootstrap — always kafka:9092 for inter-container networking
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - postgres
      - kafka

  isoaudit:
    build:
      context: ../../backend
      dockerfile: services/IsoAudit/src/IsoAudit.Api/Dockerfile
    ports:
      - "5301:5301"
    env_file: .env
    environment:
      # Kafka bootstrap — always kafka:9092 for inter-container networking
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - postgres
      - kafka

volumes:
  postgres_data:
  sqlserver_data:
